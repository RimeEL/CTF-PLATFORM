name: CI/CD Security Pipeline

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main ]

jobs:

  sonarqube-analysis:
    name: Build & SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build & SonarCloud scan
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar \
            -DskipTests \
            -Dsonar.projectKey=RimeEL_CTF-PLATFORM \
            -Dsonar.organization=rime \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}


  sonar-ai-filter:
    name: SonarCloud AI False Positive Filter
    runs-on: ubuntu-latest
    needs: sonarqube-analysis
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests joblib numpy gensim lightgbm scikit-learn pandas

      - name: Wait for SonarCloud to process analysis
        run: sleep 30

      - name: Run AI False Positive Filter
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: RimeEL_CTF-PLATFORM
          SONAR_ORG: rime
        run: python scripts/sonar_filter.py

      - name: Upload AI Filtered Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonar-ai-filtered-report
          path: sonar_filtered_report.json

  owasp-zap-scan:
    name: OWASP ZAP Dynamic Scan
    runs-on: ubuntu-latest
    needs: [sonarqube-analysis, sonar-ai-filter]
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up --build -d
          sleep 40

      - name: OWASP ZAP Baseline Scan
        run: |
          mkdir -p ${{ github.workspace }}/zap-output
          chmod 777 ${{ github.workspace }}/zap-output
          docker run --network=host \
            -v ${{ github.workspace }}/zap-output:/zap/wrk:rw \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost/ \
            -r report_html.html \
            -I || true
          echo "=== contenu zap-output ==="
          ls -la ${{ github.workspace }}/zap-output/

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: ${{ github.workspace }}/zap-output/report_html.html

      - name: Stop application
        if: always()
        run: |
          docker compose down --remove-orphans || true

  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: [sonarqube-analysis, sonar-ai-filter]
    continue-on-error: true
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image via docker compose
        run: docker compose build backend
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/trivy-cache
          key: trivy-db-${{ runner.os }}-v1
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Install Trivy CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Set Trivy cache dir
        run: echo "TRIVY_CACHE_DIR=${{ runner.temp }}/trivy-cache" >> $GITHUB_ENV

      - name: Run Trivy image scan (vuln only)
        run: |
          trivy image --scanners vuln --severity CRITICAL,HIGH --format json --output trivy-report.json --timeout 30m --skip-version-check --exit-code 0 ctf-platform-backend:ci

      - name: Run Trivy filesystem scan (vuln only)
        run: |
          trivy fs --scanners vuln --severity CRITICAL,HIGH --format json --output trivy-fs-report.json --timeout 30m --skip-version-check --exit-code 0 ./backend

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-report.json
            trivy-fs-report.json