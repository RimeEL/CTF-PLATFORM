name: CI/CD Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  sonarqube-analysis:
    name: Build & SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build & SonarCloud scan
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar \
            -DskipTests \
            -Dsonar.projectKey=RimeEL_CTF-PLATFORM \
            -Dsonar.organization=rime \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}


  owasp-zap-scan:
    name: OWASP ZAP Dynamic Scan
    runs-on: ubuntu-latest
    needs: sonarqube-analysis
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d
          sleep 40

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          allow_issue_writing: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: sonarqube-analysis
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Configuration de Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Compilation du projet backend
      - name: Build Backend with Maven
        run: |
          cd backend
          mvn clean compile

      # 3. Scan en mode léger (Ne plante pas si la DB NVD locale est vide)
      - name: Run Dependency-Check via Maven (Lightweight)
        run: |
          cd backend
          mvn org.owasp:dependency-check-maven:12.1.0:check \
            -DfailOnCVSS=7 \
            -DautoUpdate=false \
            -Ddata.failure=false \
            -DcentralAnalyzerEnabled=true \
            -DnexusAnalyzerEnabled=false \
            -DnodeAnalyzerEnabled=false
            
      # 4. Récupération du rapport
      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          
      - name: Start application
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          docker compose up -d
          sleep 40