name: CI/CD Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  sonarqube-analysis:
    name: Build & SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build & SonarCloud scan
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar \
            -DskipTests \
            -Dsonar.projectKey=RimeEL_CTF-PLATFORM \
            -Dsonar.organization=rime \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: sonarqube-analysis
    continue-on-error: true # Permet à la pipeline de continuer en phase de test si une faille bloque
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-cache-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: nvd-cache-${{ runner.os }}-

      - name: Run OWASP Dependency-Check via Maven
        working-directory: ./backend
        timeout-minutes: 45 # Augmenté à 45min pour le premier téléchargement de la base NVD
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DoutputDirectory=../dependency-check-report \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -DnvdApiDelay=6000 \
            -DretireJsAnalyzerEnabled=false \
            -DnodeAnalyzerEnabled=false

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always() # S'assure que le rapport est disponible même si le build échoue à cause d'une faille
        with:
          name: dependency-check-report
          path: dependency-check-report/

  owasp-zap-scan:
    name: OWASP ZAP Dynamic Scan
    runs-on: ubuntu-latest
    needs: sonarqube-analysis
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  

      - name: Start application
        run: |
          docker compose up -d
          sleep 40

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          allow_issue_writing: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html